<!DOCTYPE html>
<html>

<head>
    <!-- <script src="https://unpkg.com/wavesurfer.js@7"></script> -->
    <!-- <script src="https://unpkg.com/crunker@latest/dist/crunker.esm.js" type="module"></script> -->
    <script type="module">
        // let wavesurfer;
        import Crunker from "https://unpkg.com/crunker@latest/dist/crunker.esm.js";

        function extractNonSilentRegions(audioBuffer) {
            const audioData = audioBuffer.getChannelData(0);
            const duration = audioBuffer.duration;
            const minValue = 0.05;
            const mergeDuration = 0.2;
            const scale = duration / audioData.length;

            // Find when silence ends
            let startSound = 0;
            for (let i = 0; i < audioData.length; i++) {
                if (audioData[i] > minValue) {
                    startSound = i;
                    break;
                }
            }

            // Find when sounds end
            let endSound = audioData.length - 1;
            for (let i = audioData.length - 1; i > 0; i--) {
                if (audioData[i] > minValue) {
                    endSound = i;
                    break;
                }
            }

            return {
                start: scale * startSound,
                end: scale * endSound
            };
        }

        window.onGoListener = function() {
            // Change background randomly
            const backgrounds = ["bg1.png", "bg2.png", "bg3.png"];
            const randomBackground = backgrounds[Math.floor(Math.random() * backgrounds.length)];
            document.body.style.backgroundImage = `url(${randomBackground})`;

            let customWord = document.getElementById("textToSay").value;
            if (customWord == "") {
                document.getElementById("itsTimeToDuel").play();
                return;
            }

            let words = customWord.split(" ");
            // Known issue: there's no mp3 for the word "to". Replace with "two"
            words = words.map(word => word === "to" ? "two" : word);

            console.log(words);
            let crunker = new Crunker();

            // Get all individual words' sounds
            Promise.all(words.map(word => 
                fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`)
                .then(response => response.json())
                .then(data => {
                    const possiblePhonetics = data[0].phonetics;
                    const audioLink = possiblePhonetics.filter(phonetic => phonetic.audio !== "")[0].audio;
                    return crunker.fetchAudio(audioLink);
                })
                .then(buffers => {
                    const region = extractNonSilentRegions(buffers[0]);
                    return crunker.sliceAudio(buffers[0], region.start, region.end);
                })))
                .then(wordAudios => {
                    Promise.all([
                        fetch("startSound.mp3"),
                        fetch("endSound.mp3")])
                        .then(sounds => {
                            return Promise.all([
                                sounds[0].arrayBuffer(),
                                sounds[1].arrayBuffer(),
                                // Extract D and Du sounds
                                crunker.sliceAudio(wordAudios[0], 0, 0.075),
                                crunker.sliceAudio(wordAudios[0], 0, 0.1)
                            ]);
                        })
                        // Add silences
                        .then(audios => {
                            let audioContext = new AudioContext();
                            const startSound = audios[0];
                            const endSound = audios[1];
                            const dSound = audios[2];
                            const duSound = audios[3];
                            return Promise.all([
                                audioContext.decodeAudioData(startSound),
                                audioContext.decodeAudioData(endSound),
                                crunker.padAudio(dSound, 0.075, 0.04),
                                crunker.padAudio(dSound, 0.075, 0.135),
                                crunker.padAudio(dSound, 0.075, 0.138),
                                crunker.padAudio(dSound, 0.075, 0.318),
                                duSound
                            ])
                        })
                        // Combine everything
                        .then((audios) => {
                            const startSound = audios[0];
                            const endSound = audios[1];
                            const dSound1 = audios[2];
                            const dSound2 = audios[3];
                            const dSound3 = audios[4];
                            const dSound4 = audios[5];
                            const duSound = audios[6];
                            return crunker.concatAudio([startSound, dSound1, dSound2, dSound3, dSound4, duSound, duSound, duSound, duSound, duSound, ...wordAudios, endSound]);
                        })
                        .then(audio => crunker.play(audio));
                });
        }

        
    </script>

    <style>
        body {
            background-image: url("bg3.png");
            height: 100vh;
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center center;

            color: white;
            text-align: center;
        }
        .text {
            display: inline-block;
            font-family: Impact;
            font-size: 4em;
            margin: 8px;
        }
    </style>

    <title>It's time to [insert your thing]</title>
</head>

<body>
    <div style="height: 50%"></div>
    <p class="text">It's time to</p>
    <input class="text" type="text" id="textToSay" placeholder="duel">
    <p class="text">!</p><br>
    <button class="text" onclick="onGoListener()">Go</button>

    <audio id="itsTimeToDuel">
        <source src="its-time-to-duel.mp3" type="audio/mpeg">
    </audio>
</body>

</html>
